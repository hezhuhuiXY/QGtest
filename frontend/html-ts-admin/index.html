<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宿舍报修管理系统 - HTML + TS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>宿舍报修管理系统</h1>
          <p>原生 HTML + TypeScript + CSS 页面，学生与管理员共用同一登录入口和同一页面。</p>
        </div>
        <div class="toolbar">
          <input id="baseURL" placeholder="http://localhost:8080" />
          <button id="saveBaseURL" class="primary">保存后端地址</button>
          <button id="logoutBtn" class="ghost hidden">退出登录</button>
        </div>
      </header>

      <section id="notice" class="notice hidden"></section>

      <section id="authCard" class="card auth-card">
        <div class="switch-row">
          <button id="loginTab" class="active">登录</button>
          <button id="registerTab">注册</button>
        </div>
        <div class="switch-row">
          <button id="studentRoleTab" class="active">学生</button>
          <button id="adminRoleTab">管理员</button>
        </div>
        <div class="field">
          <label id="accountLabel">学号</label>
          <input id="account" placeholder="请输入学号或管理员账号" />
        </div>
        <div class="field">
          <label>密码</label>
          <input id="password" type="password" placeholder="请输入密码" />
        </div>
        <div id="confirmWrap" class="field hidden">
          <label>确认密码</label>
          <input id="confirmPassword" type="password" placeholder="请再次输入密码" />
        </div>
        <button id="submitAuth" class="primary full">立即登录</button>
      </section>

      <main id="dashboard" class="hidden">
        <section class="stats">
          <div class="stat-card">
            <span>报修总数</span>
            <strong id="statTotal">0</strong>
          </div>
          <div class="stat-card">
            <span>待处理</span>
            <strong id="statPending">0</strong>
          </div>
          <div class="stat-card">
            <span>处理中</span>
            <strong id="statProcessing">0</strong>
          </div>
          <div class="stat-card">
            <span>已完成</span>
            <strong id="statDone">0</strong>
          </div>
        </section>

        <section id="studentPanel" class="dashboard-grid hidden">
          <section class="card">
            <div class="section-head">
              <div>
                <h2>学生信息</h2>
                <p id="studentIdentity">当前学号：-</p>
              </div>
            </div>
            <div class="field">
              <label>宿舍号</label>
              <input id="studentDormitory" placeholder="例如 6-302" />
            </div>
            <button id="saveDormBtn" class="primary">绑定/修改宿舍</button>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <h2>创建报修单</h2>
                <p>按当前后端接口提交学生报修。</p>
              </div>
            </div>
            <div class="field">
              <label>报修宿舍</label>
              <input id="repairDorm" placeholder="请输入宿舍号" />
            </div>
            <div class="field">
              <label>报修内容</label>
              <textarea id="repairContent" placeholder="请输入报修问题描述"></textarea>
            </div>
            <button id="createRepairBtn" class="primary">新增报修</button>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <h2>修改密码</h2>
                <p>调用学生修改密码接口。</p>
              </div>
            </div>
            <div class="field">
              <label>旧密码</label>
              <input id="oldPassword" type="password" placeholder="请输入旧密码" />
            </div>
            <div class="field">
              <label>新密码</label>
              <input id="newPassword" type="password" placeholder="请输入新密码" />
            </div>
            <div class="field">
              <label>确认新密码</label>
              <input id="confirmNewPassword" type="password" placeholder="请再次输入新密码" />
            </div>
            <button id="updatePasswordBtn" class="primary">修改密码</button>
          </section>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2 id="listTitle">报修单列表</h2>
              <p id="listDesc">支持关键字查询、状态筛选、前端分页、详情查看、编辑和删除。</p>
            </div>
            <div class="toolbar">
              <button id="refreshBtn" class="ghost">刷新列表</button>
              <button id="deleteSelectedBtn" class="danger">删除所选</button>
            </div>
          </div>

          <div class="filters">
            <div class="field">
              <label>关键字</label>
              <input id="keyword" placeholder="编号 / 学号 / 宿舍 / 内容" />
            </div>
            <div class="field">
              <label>状态</label>
              <select id="statusFilter">
                <option value="">全部</option>
                <option value="待处理">待处理</option>
                <option value="处理中">处理中</option>
                <option value="已完成">已完成</option>
              </select>
            </div>
            <div class="field small">
              <label>每页条数</label>
              <select id="pageSize">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20">20</option>
              </select>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th><input id="selectAll" type="checkbox" /></th>
                  <th>编号</th>
                  <th>学号</th>
                  <th>宿舍号</th>
                  <th>报修内容</th>
                  <th>状态</th>
                  <th id="actionsHeader">操作</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="7">请先登录。</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="pagination">
            <span id="pageInfo">第 1 / 1 页</span>
            <div class="toolbar">
              <button id="prevPage" class="ghost">上一页</button>
              <button id="nextPage" class="ghost">下一页</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="detailModal" class="modal hidden">
      <div class="modal-card">
        <h3>报修单详情</h3>
        <div id="detailContent" class="details"></div>
        <div class="toolbar end">
          <button data-close="detailModal" class="ghost">关闭</button>
        </div>
      </div>
    </div>

    <div id="editModal" class="modal hidden">
      <div class="modal-card">
        <h3 id="editModalTitle">编辑报修状态</h3>
        <div class="field">
          <label>报修编号</label>
          <input id="editId" disabled />
        </div>
        <div class="field">
          <label>状态</label>
          <select id="editStatus">
            <option value="待处理">待处理</option>
            <option value="处理中">处理中</option>
            <option value="已完成">已完成</option>
          </select>
        </div>
        <div class="toolbar end">
          <button data-close="editModal" class="ghost">取消</button>
          <button id="saveStatusBtn" class="primary">保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
