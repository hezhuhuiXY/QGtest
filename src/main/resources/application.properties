
spring.application.name=student_system

server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/student_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis
# mapper.xml
mybatis.mapper-locations=classpath:com/system/mapper/*.xml

mybatis.type-aliases-package=com.system.pojo

mybatis.configuration.map-underscore-to-camel-case=true



logging.level.com.system.mapper=DEBUG
logging.level.com.system=DEBUG


spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

